version: "2.4"

services:
  namenode:
    build: ./namenode
    container_name: namenode
    hostname: namenode
    mem_limit: 2g
    cpus: "1.0"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data/:/hadoop-data/input
      - ./map_reduce/:/hadoop-data/map_reduce
    environment:
      - CLUSTER_NAME=test
    ports:
      - "9870:9870"
      - "8020:8020"
    networks:
      - hadoop_network

  resourcemanager:
    build: ./resourcemanager
    container_name: resourcemanager
    hostname: resourcemanager
    mem_limit: 1g
    cpus: "1.0"
    restart: on-failure
    depends_on:
      - namenode
      - datanode1
      - datanode2
      - datanode3
    ports:
      - "8089:8088"
    networks:
      - hadoop_network

  historyserver:
    build: ./historyserver
    container_name: historyserver
    hostname: historyserver
    mem_limit: 1g
    cpus: "0.5"
    depends_on:
      - namenode
      - datanode1
      - datanode2
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    ports:
      - "8188:8188"
    networks:
      - hadoop_network

  nodemanager1:
    build: ./nodemanager
    container_name: nodemanager1
    hostname: nodemanager1
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      - namenode
      - datanode1
      - datanode2
    ports:
      - "8042:8042"
    networks:
      - hadoop_network

  datanode1:
    build: ./datanode
    container_name: datanode1
    hostname: datanode1
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    ports:
      - "9864:9864"
    networks:
      - hadoop_network

  datanode2:
    build: ./datanode
    container_name: datanode2
    hostname: datanode2
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    ports:
      - "9865:9864"
    networks:
      - hadoop_network

  datanode3:
    build: ./datanode
    container_name: datanode3
    hostname: datanode3
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode3:/hadoop/dfs/data
    ports:
      - "9866:9864"
    networks:
      - hadoop_network

  notebook:
    build: ./notebook
    container_name: notebook
    hostname: notebook
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      - namenode
    volumes:
      - ./:/workspace
    ports:
      - "8888:8888"
    networks:
      - hadoop_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/api > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
  spark-master:
    build: ./spark
    image: spark-local:3.5.1
    container_name: spark-master
    mem_limit: 4g
    cpus: "2.0"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_HOME=/opt/spark
      - PYSPARK_PYTHON=/usr/bin/python3.11
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3.11
    ports:
      - "8090:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master Port
    volumes:
      - ./data:/opt/spark/data
      - ./apps:/opt/spark/apps
    networks:
      - hadoop_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080"

  spark-worker-1:
    build: ./spark
    image: spark-local:3.5.1
    container_name: spark-worker-1
    mem_limit: 3g
    cpus: "2.0"
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=7081
      - SPARK_WORKER_WEBUI_PORT=8081
      - PYSPARK_PYTHON=/usr/bin/python3.11
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3.11
    ports:
      - "8091:8081"  # Worker Web UI
    volumes:
      - ./data:/opt/spark/data
      - ./apps:/opt/spark/apps
    depends_on:
      - spark-master
    networks:
      - hadoop_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2g --webui-port 8081"

  spark-worker-2:
    build: ./spark
    image: spark-local:3.5.1
    container_name: spark-worker-2
    mem_limit: 3g
    cpus: "2.0"
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=7082
      - SPARK_WORKER_WEBUI_PORT=8082
      - PYSPARK_PYTHON=/usr/bin/python3.11
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3.11
    ports:
      - "8092:8082"  # Worker Web UI
    volumes:
      - ./data:/opt/spark/data
      - ./apps:/opt/spark/apps
    depends_on:
      - spark-master
    networks:
      - hadoop_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2g --webui-port 8082"

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_datanode3:
  hadoop_historyserver:

networks:
  hadoop_network:
    name: hadoop_network
    external: true
