server {
  listen 80;
  server_name _;

  # Basic landing page
  location = / {
    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  # Common proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_read_timeout 300s;

  # Hadoop + Spark UIs (note: some apps may not fully support subpaths)
  location /namenode/ {
    proxy_pass http://namenode:9870/;
  }

  location /resourcemanager/ {
    proxy_pass http://resourcemanager:8088/;
  }

  location /historyserver/ {
    proxy_pass http://historyserver:8188/;
  }

  location /spark-master/ {
    proxy_pass http://spark-master:8080/;
  }

  location /spark-worker-1/ {
    proxy_pass http://spark-worker-1:8081/;
  }

  location /spark-worker-2/ {
    proxy_pass http://spark-worker-2:8082/;
  }

  location /airflow/ {
    proxy_pass http://airflow-webserver:8080/;
  }

  # Jupyter requires websocket headers
  location /notebook/ {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://notebook:8888/;
  }
}
